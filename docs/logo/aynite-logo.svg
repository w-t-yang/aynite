<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background circle: Morandi very dark muted clay -->
  <circle cx="512" cy="512" r="512" fill="#403A35"/>

  <!-- Letter A (monogram) -->
  <g transform="translate(512, 512)">
    <!-- Left stroke -->
    <polygon
      points="
        -40,-324
        40,-324
        -180,320
        -260,320
      "
      fill="#FFFFFF"
    />

    <!-- Right stroke -->
    <polygon
      points="
        -40,-324
        40,-324
        260,320
        180,320
      "
      fill="#FFFFFF"
    />

    <!-- Dash (disconnected from legs): gap = 80px (same as stroke) on each side -->
    <polygon
      points="
        -100,320
        100,320
        72.67,240
        -72.67,240
      "
      fill="#FFFFFF"
    />
  </g>
</svg>
