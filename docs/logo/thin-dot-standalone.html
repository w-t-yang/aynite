<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thin + Dot · Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .logo-a-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .logo-a-dot .letter {
      font-size: 640px;
      font-weight: 240;
      color: #111;
      letter-spacing: 0;
    }
    .logo-a-dot .dot {
      width: 32px;
      height: 32px;
      background: #111;
      border-radius: 50%;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="logo-a-dot">
    <span class="letter">A</span>
    <span class="dot"></span>
  </div>
</body>
</html>
