<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aynite · Topology Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f4;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }

    .logo-container {
      position: relative;
      width: 1024px;
      height: 1024px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Inner wrapper: renders at container size, no scaling */
    .vanta-inner {
      position: absolute;
      width: 1024px;
      height: 1024px;
      top: 0;
      left: 0;
    }

    /* ── Core logo: Thin "A" with dot ── */
    .logo-a-dot {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .logo-a-dot .letter {
      font-size: 340px;
      font-weight: 200;
      color: #fff;
      letter-spacing: 0;
    }
    .logo-a-dot .dot {
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      margin-top: 4px;
    }

    /* backdrop for readability */
    .logo-a-dot .backdrop {
      position: absolute;
      inset: -60px -80px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(30px);
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="vanta-inner" id="v-topology"></div>
    <div class="logo-a-dot">
      <div class="backdrop"></div>
      <span class="letter">A</span>
      <span class="dot"></span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>

  <script>
    VANTA.TOPOLOGY({
      el: "#v-topology",
      mouseControls: false,
      touchControls: false,
      gyroControls: false,
      minHeight: 1024.00,
      minWidth: 1024.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0xcccccc,
      backgroundColor: 0x0
    });
  </script>
</body>
</html>
